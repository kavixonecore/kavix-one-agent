<mat-card class="progress-form">
  <mat-card-header>
    <mat-card-title>{{ isEditing ? 'Edit Metric' : 'Add Metric' }}</mat-card-title>
  </mat-card-header>
  <mat-card-content>
    <form [formGroup]="form" (ngSubmit)="onSubmit()" class="progress-form__fields">
      <mat-form-field>
        <mat-label>Metric Type</mat-label>
        <mat-select formControlName="metricType">
          @for (mt of metricTypes; track mt) {
            <mat-option [value]="mt">{{ mt }}</mat-option>
          }
        </mat-select>
      </mat-form-field>

      @if (isCustom) {
        <mat-form-field>
          <mat-label>Custom Metric Name</mat-label>
          <input matInput formControlName="customMetricName" placeholder="e.g. VO2 Max" />
        </mat-form-field>
      }

      <mat-form-field>
        <mat-label>Value</mat-label>
        <input matInput type="number" step="0.1" formControlName="value" />
      </mat-form-field>

      <mat-form-field>
        <mat-label>Unit</mat-label>
        <input matInput formControlName="unit" placeholder="e.g. lbs, %, bpm" />
      </mat-form-field>

      <mat-form-field>
        <mat-label>Date</mat-label>
        <input matInput type="date" formControlName="date" />
      </mat-form-field>

      <mat-form-field>
        <mat-label>Notes</mat-label>
        <textarea matInput formControlName="notes" rows="3"></textarea>
      </mat-form-field>

      <div class="progress-form__actions">
        <button mat-raised-button color="primary" type="submit" [disabled]="form.invalid">
          {{ isEditing ? 'Update' : 'Add' }}
        </button>
        <button mat-button type="button" (click)="onCancel()">Cancel</button>
      </div>
    </form>
  </mat-card-content>
</mat-card>
