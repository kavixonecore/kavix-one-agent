<div class="login">
  <mat-card class="login__card">
    <mat-card-header>
      <mat-card-title>Fitness Tracker</mat-card-title>
      <mat-card-subtitle>Sign in to continue</mat-card-subtitle>
    </mat-card-header>
    <mat-card-content>
      @if (isLoading()) {
        <div class="login__spinner">
          <mat-spinner diameter="40"></mat-spinner>
          <p>Redirecting to login...</p>
        </div>
      } @else {
        <div class="login__buttons">
          <button mat-raised-button class="login__btn login__btn--google" (click)="loginWithGoogle()">
            <mat-icon>g_mobiledata</mat-icon>
            Sign in with Google
          </button>
          <button mat-raised-button class="login__btn login__btn--github" (click)="loginWithGitHub()">
            <mat-icon>code</mat-icon>
            Sign in with GitHub
          </button>
          <button mat-raised-button class="login__btn login__btn--apple" (click)="loginWithApple()">
            <mat-icon>apple</mat-icon>
            Sign in with Apple
          </button>
          <button mat-raised-button class="login__btn login__btn--microsoft" (click)="loginWithMicrosoft()">
            <mat-icon>window</mat-icon>
            Sign in with Microsoft
          </button>

          <mat-divider></mat-divider>

          <button mat-stroked-button class="login__btn" (click)="loginDefault()">
            <mat-icon>login</mat-icon>
            Sign in with Email
          </button>
        </div>
      }
    </mat-card-content>
  </mat-card>
</div>
