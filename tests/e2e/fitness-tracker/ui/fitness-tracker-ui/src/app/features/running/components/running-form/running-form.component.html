<mat-card class="running-form">
  <mat-card-header>
    <mat-card-title>{{ isEditing ? 'Edit Run' : 'Log a Run' }}</mat-card-title>
  </mat-card-header>
  <mat-card-content>
    <form [formGroup]="form" (ngSubmit)="onSubmit()" class="running-form__fields">
      <mat-form-field>
        <mat-label>Workout ID</mat-label>
        <input matInput formControlName="workoutId" placeholder="Enter workout ID" />
      </mat-form-field>

      <mat-form-field>
        <mat-label>Distance (miles)</mat-label>
        <input matInput type="number" step="0.01" formControlName="distanceMiles" />
      </mat-form-field>

      <mat-form-field>
        <mat-label>Duration (minutes)</mat-label>
        <input matInput type="number" step="0.1" formControlName="durationMinutes" />
      </mat-form-field>

      @if (calculatedPace(); as pace) {
        <p class="running-form__pace">Calculated Pace: {{ pace }} min/mi</p>
      }

      <mat-form-field>
        <mat-label>Route Name</mat-label>
        <input matInput formControlName="routeName" />
      </mat-form-field>

      <mat-form-field>
        <mat-label>Elevation Gain (feet)</mat-label>
        <input matInput type="number" formControlName="elevationGainFeet" />
      </mat-form-field>

      <mat-form-field>
        <mat-label>Avg Heart Rate</mat-label>
        <input matInput type="number" formControlName="heartRateAvg" />
      </mat-form-field>

      <mat-form-field>
        <mat-label>Weather</mat-label>
        <input matInput formControlName="weather" />
      </mat-form-field>

      <mat-form-field>
        <mat-label>Notes</mat-label>
        <textarea matInput formControlName="notes" rows="3"></textarea>
      </mat-form-field>

      <div class="running-form__actions">
        <button mat-raised-button color="primary" type="submit" [disabled]="form.invalid">
          {{ isEditing ? 'Update' : 'Log Run' }}
        </button>
        <button mat-button type="button" (click)="onCancel()">Cancel</button>
      </div>
    </form>
  </mat-card-content>
</mat-card>
