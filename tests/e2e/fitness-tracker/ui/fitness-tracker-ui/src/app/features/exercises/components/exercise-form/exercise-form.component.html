<mat-card class="exercise-form">
  <mat-card-header>
    <mat-card-title>{{ isEditing ? 'Edit Exercise' : 'New Exercise' }}</mat-card-title>
  </mat-card-header>
  <mat-card-content>
    <form [formGroup]="form" (ngSubmit)="onSubmit()" class="exercise-form__fields">
      <mat-form-field>
        <mat-label>Name</mat-label>
        <input matInput formControlName="name" placeholder="Exercise name" />
      </mat-form-field>

      <mat-form-field>
        <mat-label>Description</mat-label>
        <textarea matInput formControlName="description" rows="2"></textarea>
      </mat-form-field>

      <mat-form-field>
        <mat-label>Muscle Group</mat-label>
        <mat-select formControlName="muscleGroup">
          @for (mg of muscleGroups; track mg) {
            <mat-option [value]="mg">{{ mg }}</mat-option>
          }
        </mat-select>
      </mat-form-field>

      <mat-form-field>
        <mat-label>Difficulty Level</mat-label>
        <mat-select formControlName="difficultyLevel">
          @for (dl of difficultyLevels; track dl) {
            <mat-option [value]="dl">{{ dl }}</mat-option>
          }
        </mat-select>
      </mat-form-field>

      <mat-form-field>
        <mat-label>Instructions</mat-label>
        <textarea matInput formControlName="instructions" rows="3"></textarea>
      </mat-form-field>

      <!-- Equipment -->
      <div class="exercise-form__equipment">
        <mat-form-field>
          <mat-label>Add Equipment</mat-label>
          <input matInput formControlName="newEquipment" (keyup.enter)="addEquipment()" />
        </mat-form-field>
        <button mat-button type="button" (click)="addEquipment()">Add</button>
      </div>

      <div class="exercise-form__chips">
        @for (eq of equipment; track eq) {
          <mat-chip-row (removed)="removeEquipment(eq)">
            {{ eq }}
            <button matChipRemove><mat-icon>cancel</mat-icon></button>
          </mat-chip-row>
        }
      </div>

      <div class="exercise-form__actions">
        <button mat-raised-button color="primary" type="submit" [disabled]="form.invalid">
          {{ isEditing ? 'Update' : 'Create' }}
        </button>
        <button mat-button type="button" (click)="onCancel()">Cancel</button>
      </div>
    </form>
  </mat-card-content>
</mat-card>
