<mat-toolbar color="primary" class="navbar">
  <span class="navbar__brand">Fitness Tracker</span>

  <nav class="navbar__links">
    @for (link of navLinks; track link.path) {
      <a
        mat-button
        [routerLink]="link.path"
        routerLinkActive="navbar__link--active"
        class="navbar__link"
      >
        <mat-icon>{{ link.icon }}</mat-icon>
        <span class="navbar__link-label">{{ link.label }}</span>
      </a>
    }
  </nav>

  <span class="navbar__spacer"></span>

  <a mat-button routerLink="/auth/login" class="navbar__link">
    <mat-icon>login</mat-icon>
    <span class="navbar__link-label">Token</span>
  </a>
</mat-toolbar>
