services:
  mongodb:
    image: mongo:7
    container_name: fitness-tracker-mongo
    restart: unless-stopped
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_ROOT_USERNAME: admin
      MONGO_INITDB_ROOT_PASSWORD: password
      MONGO_INITDB_DATABASE: fitness_tracker
    volumes:
      - mongodb_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: fitness-tracker-api
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      MONGODB_URI: mongodb://admin:password@mongodb:27017/fitness_tracker?authSource=admin
      PORT: "3000"
      NODE_ENV: development
      LOG_LEVEL: info
      # Auth — set these for your OIDC provider
      # JWKS_URL: https://your-tenant.auth0.com/.well-known/jwks.json
      # JWT_ISSUER: https://your-tenant.auth0.com/
      # JWT_AUDIENCE: https://api.your-app.com
      RATE_LIMIT_IP_PER_MIN: "100"
      RATE_LIMIT_USER_PER_MIN: "1000"
    depends_on:
      mongodb:
        condition: service_healthy

volumes:
  mongodb_data:
    driver: local
