<mat-card class="form-card">
  <mat-card-header>
    <mat-card-title>Assign Roles to {{ userId() }}</mat-card-title>
    <button mat-icon-button (click)="closed.emit()">
      <mat-icon>close</mat-icon>
    </button>
  </mat-card-header>
  <mat-card-content>
    <form [formGroup]="form" (ngSubmit)="onAssign()">
      <mat-form-field appearance="outline" class="full-width">
        <mat-label>Roles</mat-label>
        <mat-select formControlName="roleIds" multiple>
          @for (role of state.allRoles(); track role.id) {
            <mat-option [value]="role.id">{{ role.name }}</mat-option>
          }
        </mat-select>
      </mat-form-field>

      <div class="form-actions">
        <button mat-flat-button color="primary" type="submit">Assign</button>
      </div>
    </form>
  </mat-card-content>
</mat-card>
