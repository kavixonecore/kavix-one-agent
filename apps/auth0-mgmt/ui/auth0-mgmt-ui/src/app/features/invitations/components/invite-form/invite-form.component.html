<mat-card class="form-card">
  <mat-card-header>
    <mat-card-title>Send Invitation</mat-card-title>
  </mat-card-header>
  <mat-card-content>
    <form [formGroup]="form" (ngSubmit)="onSubmit()">
      <mat-form-field appearance="outline" class="full-width">
        <mat-label>Invitee Email</mat-label>
        <input matInput formControlName="inviteeEmail" placeholder="user@example.com">
      </mat-form-field>

      <mat-form-field appearance="outline" class="full-width">
        <mat-label>Inviter Name</mat-label>
        <input matInput formControlName="inviterName" placeholder="Admin">
      </mat-form-field>

      <mat-form-field appearance="outline" class="full-width">
        <mat-label>Client ID</mat-label>
        <input matInput formControlName="clientId" placeholder="Auth0 Application Client ID">
      </mat-form-field>

      <mat-form-field appearance="outline" class="full-width">
        <mat-label>Connection (optional)</mat-label>
        <mat-select formControlName="connectionId">
          <mat-option value="">None</mat-option>
          @for (conn of connectionsState.orgConnections(); track conn.connectionId) {
            <mat-option [value]="conn.connectionId">{{ conn.connection.name }}</mat-option>
          }
        </mat-select>
      </mat-form-field>

      <mat-form-field appearance="outline" class="full-width">
        <mat-label>Roles (optional)</mat-label>
        <mat-select formControlName="roleIds" multiple>
          @for (role of rolesState.roles(); track role.id) {
            <mat-option [value]="role.id">{{ role.name }}</mat-option>
          }
        </mat-select>
      </mat-form-field>

      <mat-form-field appearance="outline" class="full-width">
        <mat-label>TTL (seconds)</mat-label>
        <input matInput formControlName="ttlSec" type="number">
      </mat-form-field>

      <div class="form-actions">
        <button mat-flat-button color="primary" type="submit" [disabled]="form.invalid">
          Send
        </button>
      </div>
    </form>
  </mat-card-content>
</mat-card>
