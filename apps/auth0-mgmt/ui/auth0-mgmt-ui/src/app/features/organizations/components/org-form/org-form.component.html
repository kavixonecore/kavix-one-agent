<mat-card class="form-card">
  <mat-card-header>
    <mat-card-title>Create Organization</mat-card-title>
  </mat-card-header>
  <mat-card-content>
    <form [formGroup]="form" (ngSubmit)="onSubmit()">
      <mat-form-field appearance="outline" class="full-width">
        <mat-label>Name (slug)</mat-label>
        <input matInput formControlName="name" placeholder="my-org">
        @if (form.controls.name.hasError("pattern")) {
          <mat-error>Only lowercase letters, numbers, and hyphens</mat-error>
        }
      </mat-form-field>

      <mat-form-field appearance="outline" class="full-width">
        <mat-label>Display Name</mat-label>
        <input matInput formControlName="displayName" placeholder="My Organization">
      </mat-form-field>

      <div class="form-actions">
        <button mat-flat-button color="primary" type="submit" [disabled]="form.invalid">
          Create
        </button>
      </div>
    </form>
  </mat-card-content>
</mat-card>
